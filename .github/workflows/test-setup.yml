name: test-setup

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Syntax check
        run: node -c bin/setup.js

      - name: Run setup.js non-interactively (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          OUT="$RUNNER_TEMP/sb-ci-out"
          printf 'CI Test\nN\nY\nN\n' | node bin/setup.js "$OUT"
          test -f "$OUT/README.md"
          test -d "$OUT/.git"
          test ! -d "$OUT/.agents/skills/examples/odoo"
          grep -q "CI Test" "$OUT/.agents/claude-memory/core.md"
          test -f "$OUT/.mcp.json"

      - name: Run setup.js non-interactively (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $out = Join-Path $env:RUNNER_TEMP "sb-ci-out"
          "CI Test`nN`nY`nN" | node bin/setup.js $out
          if (!(Test-Path "$out\README.md")) { throw "README.md missing" }
          if (!(Test-Path "$out\.git")) { throw ".git missing" }
          if (Test-Path "$out\.agents\skills\examples\odoo") { throw "odoo example pack was not removed" }
          if (!(Select-String -Path "$out\.agents\claude-memory\core.md" -Pattern "CI Test" -Quiet)) { throw "name placeholder not filled in" }
          if (!(Test-Path "$out\.mcp.json")) { throw ".mcp.json not created from example" }

      # Alias installer touches files outside the scaffolded vault
      # (~/.bashrc or PowerShell $PROFILE), so it's tested here with HOME
      # sandboxed to a scratch dir — never the runner's real shell config.
      - name: Test shell-alias installer + idempotency, claude profile (Linux/macOS, sandboxed HOME)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          export HOME="$RUNNER_TEMP/sb-fake-home"
          mkdir -p "$HOME"
          printf 'CI Test\nN\nN\nY\nclaude\n' | node bin/setup.js "$RUNNER_TEMP/sb-alias-out-1"
          test -f "$HOME/.bashrc"
          grep -q "ai-second-brain-template: secondbrain mode alias" "$HOME/.bashrc"
          # must use the -file flag + mktemp, NOT the inline-arg form (avoids
          # ARG_MAX once memory files grow — see docs/alias-modes.md)
          grep -q -- '--append-system-prompt-file' "$HOME/.bashrc"
          grep -q 'mktemp' "$HOME/.bashrc"
          grep -q 'rm -f "\$ctx_file"' "$HOME/.bashrc"
          # second run must not duplicate the block
          printf 'CI Test\nN\nN\nY\nclaude\n' | node bin/setup.js "$RUNNER_TEMP/sb-alias-out-2"
          count=$(grep -c "ai-second-brain-template: secondbrain mode alias" "$HOME/.bashrc")
          test "$count" -eq 2  # one block = one start marker + one end marker

      # Prove the -file fix actually survives context far past argv limits
      # (this system's ARG_MAX; ~8191 chars on Windows cmd.exe) — the inline
      # form this replaced would hard-fail here with E2BIG. Runs the REAL
      # generated function (sourced from .bashrc), stubbing only `claude`
      # itself so no real CLI call is needed.
      - name: Stress test claude alias with context exceeding ARG_MAX (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          export HOME="$RUNNER_TEMP/sb-fake-home-stress"
          mkdir -p "$HOME"
          OUT="$RUNNER_TEMP/sb-stress-out"
          printf 'CI Test\nN\nN\nY\nclaude\n' | node bin/setup.js "$OUT"
          python3 -c "print('x' * 5_000_000)" >> "$OUT/.agents/AGENTS.md"

          claude() {
            if [ "$1" = "--append-system-prompt-file" ]; then
              wc -c < "$2"
            fi
          }
          export -f claude
          source "$HOME/.bashrc"
          size=$(secondbrain | tail -1)
          test "$size" -gt 5000000

      # agy (Antigravity) has no --append-system-prompt equivalent — it
      # auto-reads AGENTS.md from the working directory, so its alias must
      # take the cd-and-run shape, not the flag-based one claude gets.
      - name: Test shell-alias installer, agy profile (Linux/macOS, sandboxed HOME)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          export HOME="$RUNNER_TEMP/sb-fake-home-agy"
          mkdir -p "$HOME"
          printf 'CI Test\nN\nN\nY\nagy\n' | node bin/setup.js "$RUNNER_TEMP/sb-alias-out-agy"
          grep -F 'cd "$vault" && agy' "$HOME/.bashrc"
          ! grep -q -- '--append-system-prompt' "$HOME/.bashrc"  # agy must not get claude's flag
          # agy only auto-reads AGENTS.md, not HANDOFF.md — so the scaffolded
          # AGENTS.md must carry an explicit instruction to check for one.
          grep -qi 'HANDOFF.md' "$RUNNER_TEMP/sb-alias-out-agy/.agents/AGENTS.md"

      # Cross-tool handoff: the claude alias must pick up HANDOFF.md when
      # present and must NOT invent a "## Handoff" section when absent.
      - name: Test HANDOFF.md pickup in claude alias (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          export HOME="$RUNNER_TEMP/sb-fake-home-handoff"
          mkdir -p "$HOME"
          OUT="$RUNNER_TEMP/sb-handoff-out"
          printf 'CI Test\nN\nN\nY\nclaude\n' | node bin/setup.js "$OUT"

          claude() {
            if [ "$1" = "--append-system-prompt-file" ]; then
              cat "$2"
            fi
          }
          export -f claude
          source "$HOME/.bashrc"

          ! secondbrain | grep -q '## Handoff'
          echo "Fixed the bug. Next: write tests." > "$OUT/HANDOFF.md"
          secondbrain | grep -q '## Handoff'
          secondbrain | grep -q 'Fixed the bug'
